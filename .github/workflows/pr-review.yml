name: PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr_diff.txt
          # 截断过长的 diff，避免超出 API 限制
          head -c 80000 /tmp/pr_diff.txt > /tmp/pr_diff_trimmed.txt

      - name: AI Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/review_pr.py "${{ github.event.pull_request.number }}"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: |
          pip install ruff pylint-odoo

      - name: Ruff check
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Pylint-odoo check
        run: |
          # 只检查变更的 Python 文件
          git diff --name-only origin/main...HEAD -- '*.py' | \
            xargs -r pylint --load-plugins=pylint_odoo \
              --disable=all --enable=odoolint \
              -e manifest-required-key \
              -e method-required-super \
              -e sql-injection \
              -e translation-required \
            || true
        continue-on-error: true
